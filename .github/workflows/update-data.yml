name: Update Infectious Disease Data

on:
  schedule:
    # 1日3回: UTC 0:00, 8:00, 16:00 (JST 9:00, 17:00, 1:00)
    - cron: "0 0 * * *"
    - cron: "0 8 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser python-dotenv deep-translator

      - name: Fetch data
        env:
          BLUEDOT_API_KEY: ${{ secrets.BLUEDOT_API_KEY }}
        run: python "fetch_brazil_infectious disease.py"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/brazil_infectious_diseases.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update infectious disease data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
